name: Test

on:
  pull_request:
  push:
  workflow_dispatch:

jobs:
  fresh-machine:
    name: Fresh machine (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Emacs on macOS
        if: runner.os == 'macOS'
        run: brew install --cask emacs

      - name: Install Emacs on Linux
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y emacs

      - name: Print Emacs version
        run: emacs --version

      - name: Test fresh setup
        shell: bash
        run: |
          set -o pipefail

          export HOME="$RUNNER_TEMP/emacs-home"
          export EMACS_INHIBIT_NATIVE_COMPILE=1
          mkdir -p "$HOME/.emacs.d"
          ln -s "$GITHUB_WORKSPACE/init.el" "$HOME/.emacs.d/init.el"

          run_emacs() {
            emacs --batch \
              --eval "(when (boundp 'native-comp-jit-compilation) (setq native-comp-jit-compilation nil))" \
              --eval "(when (boundp 'native-comp-deferred-compilation) (setq native-comp-deferred-compilation nil))" \
              --eval "(when (boundp 'native-comp-enable-subr-trampolines) (setq native-comp-enable-subr-trampolines nil))" \
              --eval "(when (boundp 'no-native-compile) (setq no-native-compile t))" \
              --eval "(when (boundp 'load-no-native) (setq load-no-native t))" \
              -l "$HOME/.emacs.d/init.el" \
              --eval '(message "init loaded")' \
              "$@"
          }

          bootstrap_log="$RUNNER_TEMP/emacs-bootstrap.log"
          echo "::group::Bootstrap startup"
          run_emacs 2>&1 | tee "$bootstrap_log"
          echo "::endgroup::"

          if grep -E '(Failed to|No public key|Package .* is unavailable|Signature.*failed)' "$bootstrap_log"; then
            echo "::error::Emacs bootstrap produced errors."
            exit 1
          fi

          log="$RUNNER_TEMP/emacs-startup.log"
          echo "::group::Steady-state startup"
          run_emacs 2>&1 | tee "$log"
          echo "::endgroup::"

          if grep -E '(⛔ Warning|Warning|Error|Failed to|Cannot open load file)' "$log"; then
            echo "::error::Emacs steady-state startup produced warnings or errors."
            exit 1
          fi

          leader_log="$RUNNER_TEMP/emacs-leader-keys.log"
          echo "::group::Leader key self-test"
          run_emacs \
            --eval '(progn
                      (require (quote evil))
                      (unless (where-is-internal (quote org-agenda) nil t)
                        (error "Missing leader binding for org-agenda"))
                      (unless (where-is-internal (quote org-capture) nil t)
                        (error "Missing leader binding for org-capture"))
                      (message "leader keys available"))' \
            2>&1 | tee "$leader_log"
          echo "::endgroup::"
